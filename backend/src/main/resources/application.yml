spring:
  application:
    name: hackaton-b

  datasource:
    url: jdbc:postgresql://localhost:5432/hackaton-b
    username: ${DB_USERNAME:hackaton-b}
    password: ${DB_PASSWORD:hackaton-b}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000
