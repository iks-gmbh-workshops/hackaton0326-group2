spring:
  application:
    name: hackaton-b

  datasource:
    url: jdbc:postgresql://localhost:5433/hackaton-b
    username: ${DB_USERNAME:hackaton-b}
    password: ${DB_PASSWORD:hackaton-b}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: mail.iks-gmbh.com
    port: 465
    username: no-reply@iks-gmbh.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true          # SSL aktivieren
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
      default-encoding: UTF-8

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000
