version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: reme-db
    environment:
      POSTGRES_DB: reme
      POSTGRES_USER: ${DB_USERNAME:-reme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-reme} -d reme"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reme-backend
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME:-reme}
      DB_PASSWORD: ${DB_PASSWORD:-reme}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/reme
      JWT_SECRET: ${JWT_SECRET:-changeme-in-production}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reme-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
