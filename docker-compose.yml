version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: hackaton-b-db
    environment:
      POSTGRES_DB: hackaton-b
      POSTGRES_USER: ${DB_USERNAME:-hackaton-b}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hackaton-b}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-hackaton-b} -d hackaton-b"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackaton-b-backend
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: ${DB_USERNAME:-hackaton-b}
      DB_PASSWORD: ${DB_PASSWORD:-hackaton-b}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hackaton-b
      JWT_SECRET: ${JWT_SECRET:-changeme-in-production}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackaton-b-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
